<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular Peso por Recorrido</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom right, #f0f4f8, #d9e8ff);
            color: #333;
        }
        header {
    background: #004680;
    padding: 1rem 2rem;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
    text-align: center;
}

header h1 {
    font-size: 3rem;
    color: #ffc107;
    text-transform: uppercase;
    margin: 0.5rem 0;
}

header p {
    color: #e0e0e0;
    font-style: italic;
    margin: 0;
}

        h1 {
            text-align: center;
            margin: 20px 0;
            color: #2a5d9f;
        }

        input[type="file"] {
            display: block;
            margin: 20px auto;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            font-size: 16px;
            box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.3s;
        }

        input[type="file"]:hover {
            box-shadow: 2px 2px 12px rgba(0, 0, 0, 0.2);
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 16px;
            color: #fff;
            background-color: #2a5d9f;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            background-color: #1d4a7c;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(1);
        }

        #resultTable {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            box-shadow: 2px 2px 12px rgba(0, 0, 0, 0.1);
            background-color: #fff;
            border-radius: 5px;
            overflow: hidden;
        }

        #resultTable thead {
            background-color: #2a5d9f;
            color: #fff;
        }

        #resultTable th, #resultTable td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
        }

        #resultTable tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        #resultTable tbody tr:hover {
            background-color: #f1f7ff;
        }

        #resultTable tbody td {
            color: #555;
            font-size: 16px;
        }
    </style>
</head>
<header>
    <h1>Grupo L</h1>
    <h1>Asignación de Recorridos</h1>
    <p>Dashboard y Gestión de Asignaciones</p>
    <div class="menu-container">
        <h2>Menú Principal</h2>
        <ul>
            <li><a href="planificacion-fruver.html">Planificación Fru-Ver</a></li>
            <li><a href="index.html">Ciudadela</a></li>
            <li><a href="calcularpesoporrecorrido.html">Calcular Peso</a></li>
        </ul>
    </div>
</header>
<body>
    <h1>Calcular Peso por Recorrido</h1>
    <input type="file" id="fileInput" accept=".csv">
    <button id="processButton">Procesar Archivo</button>
    <table border="1" id="resultTable">
        <thead>
            <tr>
                <th>Recorrido</th>
                <th>Peso Total (kg)</th>
            </tr>
        </thead>
        <tbody>
            <!-- Los resultados se mostrarán aquí -->
        </tbody>
    </table>

    <script>
        // Base de datos de peso por artículo (Cod. Artículo: Peso en kg)
        const articleWeights = {
            '7791813420583': 0.5,
            '7791813421528': 1.5,
            '7791813420521': 0.5,
            '7791813777038': 0.5,
            '7790070012050': 0.9
        };

        document.getElementById('processButton').addEventListener('click', () => {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                alert('Por favor, seleccione un archivo CSV.');
                return;
            }

            const reader = new FileReader();
            reader.onload = function (event) {
                const csvData = event.target.result;
                processCSV(csvData);
            };
            reader.readAsText(file);
        });

        function processCSV(csvData) {
    const lines = csvData.split('\n').filter(line => line.trim() !== '');
    const header = lines[0].split(',').map(col => col.trim().toLowerCase()); // Normaliza encabezados a minúsculas
    const data = lines.slice(1).map(line => line.split(',').map(col => col.trim()));

    const mapColumn = (columns, possibleNames) => {
        return columns.findIndex(col => possibleNames.includes(col));
    };

    const recorridoIndex = mapColumn(header, ['flete', 'recorrido']);
    const codigoArticuloIndex = mapColumn(header, ['cod. artículo', 'codigo articulo', 'codigo']);
    const cantidadIndex = mapColumn(header, ['cantidad', 'cantidad pedida']);

    if (recorridoIndex === -1 || codigoArticuloIndex === -1 || cantidadIndex === -1) {
        alert(`El archivo CSV no contiene las columnas necesarias.\n\nEncabezados detectados: ${header.join(', ')}`);
        return;
    }

    const recorridoWeights = {};

    data.forEach(row => {
        const recorrido = row[recorridoIndex] || '';
        const codigoArticulo = row[codigoArticuloIndex] || '';
        const cantidad = parseFloat(row[cantidadIndex]) || 0;

        const pesoArticulo = articleWeights[codigoArticulo] || 0;
        const pesoTotal = pesoArticulo * cantidad;

        if (!recorridoWeights[recorrido]) {
            recorridoWeights[recorrido] = 0;
        }

        recorridoWeights[recorrido] += pesoTotal;
    });

    displayResults(recorridoWeights);
}


        function displayResults(recorridoWeights) {
            const tbody = document.getElementById('resultTable').querySelector('tbody');
            tbody.innerHTML = '';

            Object.entries(recorridoWeights).forEach(([recorrido, pesoTotal]) => {
                const row = document.createElement('tr');

                const recorridoCell = document.createElement('td');
                recorridoCell.textContent = recorrido;

                const pesoCell = document.createElement('td');
                pesoCell.textContent = pesoTotal.toFixed(2);

                row.appendChild(recorridoCell);
                row.appendChild(pesoCell);

                tbody.appendChild(row);
            });
        }
    </script>
</body>
</html>
