        /* Modern CSS Design */
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #212529;
        }

        header {
            background: linear-gradient(90deg, #007bff, #6610f2);
            color: white;
            padding: 2rem;
            text-align: center;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
        }

        header p {
            font-size: 1.2rem;
            margin: 0.5rem 0 0;
            color: #d1d1d1;
        }

        nav {
            display: flex;
            justify-content: center;
            background: #343a40;
            padding: 1rem;
            box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
        }

        nav a {
            color: #f8f9fa;
            text-decoration: none;
            margin: 0 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #007bff;
        }

        main {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        section {
            margin-bottom: 2rem;
        }

        h2 {
            color: #007bff;
            font-size: 1.8rem;
            border-bottom: 2px solid #007bff;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .button {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(90deg, #007bff, #6610f2);
            color: white;
            border: none;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .button:hover {
            background: linear-gradient(90deg, #0056b3, #520dbf);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
        }

        table, th, td {
            border: 1px solid #dee2e6;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            font-size: 0.9rem;
        }

        th {
            background: #007bff;
            color: white;
        }

        .upload-container {
            margin-top: 1rem;
            padding: 1.5rem;
            background: #f1f1f1;
            border: 2px dashed #007bff;
            border-radius: 10px;
            text-align: center;
            transition: background 0.3s ease;
        }

        .upload-container:hover {
            background: #e9ecef;
        }

        .upload-container input {
            margin-top: 1rem;
            padding: 0.5rem;
            font-size: 1rem;
        }

        .error-message {
            color: #dc3545;
            font-weight: bold;
            margin-top: 1rem;
        }

        .success-message {
            color: #28a745;
            font-weight: bold;
            margin-top: 1rem;
        }

        footer {
            background: #343a40;
            color: #f8f9fa;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
            border-top: 2px solid #007bff;
        }

        footer p {
            margin: 0;
            font-size: 0.9rem;
        }

            function processAndAssign(data) {
                const headers = data[0].map(h => h.trim());
                const assignments = data.slice(1).filter(row => row.length === headers.length).map(row => {
                    const recorrido = row[headers.indexOf('RECORRIDO')].trim();
                    const peso = parseFloat(row[headers.indexOf('demandaKG')]);

                    if (isNaN(peso) || !recorrido) {
                        return {
                            Recorrido: recorrido || 'Desconocido',
                            Peso: peso || 'Desconocido',
                            Chofer: 'Sin asignar',
                            Ayudante: 'Sin asignar',
                            Patente: 'Sin asignar',
                            Capacidad: 'N/A',
                            'Porcentaje de Ocupación': 'N/A',
                            Horario: 'Sin horario',
                            Vuelta: 'Sin vuelta',
                            Observaciones: 'Datos incompletos'
                        };
                    }

                    // Find the appropriate unit and chofer not already assigned
                    const unit = baseData.choferesUnidades.find(u => u.capacidad >= peso && !assignedChoferes.has(u.chofer));
                    if (!unit) {
                        return {
                            Recorrido: recorrido,
                            Peso: peso,
                            Chofer: 'Sin asignar',
                            Ayudante: 'Sin asignar',
                            Patente: 'Sin asignar',
                            Capacidad: 'N/A',
                            'Porcentaje de Ocupación': 'N/A',
                            Horario: baseData.horarios.find(h => h.recorrido === recorrido)?.horario || 'Sin horario',
                            Vuelta: baseData.vueltas.find(v => v.recorrido === recorrido)?.vuelta || 'Sin vuelta',
                            Observaciones: 'Capacidad insuficiente o chofer no disponible'
                        };
                    }

                    assignedChoferes.add(unit.chofer); // Mark chofer as assigned

                    const horario = baseData.horarios.find(h => h.recorrido === recorrido)?.horario || 'Sin horario';
                    const vuelta = baseData.vueltas.find(v => v.recorrido === recorrido)?.vuelta || 'Sin vuelta';
                    const ayudante = baseData.ayudantes.find(a => a.chofer === unit.chofer)?.ayudante || 'Sin ayudante';

                    const porcentajeOcupacion = ((peso / unit.capacidad) * 100).toFixed(2) + '%';

                    return {
                        Recorrido: recorrido,
                        Peso: peso,
                        Chofer: unit.chofer,
                        Ayudante: ayudante,
                        Patente: unit.patente,
                        Capacidad: unit.capacidad,
                        'Porcentaje de Ocupación': porcentajeOcupacion,
                        Horario: horario,
                        Vuelta: vuelta,
                        Observaciones: 'Asignación completada'
                    };
                });

                displayAssignments(assignments);
            }

            function displayAssignments(assignments) {
                const table = document.createElement('table');
                const headerRow = document.createElement('tr');

                Object.keys(assignments[0]).forEach(header => {
                    const th = document.createElement('th');
                    th.textContent = header;
                    headerRow.appendChild(th);
                });
                table.appendChild(headerRow);

                assignments.forEach(assignment => {
                    const row = document.createElement('tr');
                    Object.values(assignment).forEach(value => {
                        const td = document.createElement('td');
                        td.textContent = value;
                        row.appendChild(td);
                    });
                    table.appendChild(row);
                });

                dataDisplay.innerHTML = '';
                dataDisplay.appendChild(table);
            }
        });
    </script>
