<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular Peso por Recorrido</title>
    <style>
        /* Estilo general del cuerpo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom right, #f0f8ff, #e6f7ff);
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Encabezado */
        h1 {
            font-size: 2.5em;
            color: #2a7d8c;
            margin: 20px 0;
        }

        /* Contenedor del menú */
        .menu-container {
            text-align: center;
            margin: 20px auto;
            padding: 20px;
            background: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
        }

        .menu-container h2 {
            color: #2a7d8c;
            font-size: 1.8em;
            margin-bottom: 20px;
        }

        .menu-container ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-container li {
            margin: 10px 0;
        }

        .menu-container a {
            text-decoration: none;
            color: white;
            background: #2a7d8c;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .menu-container a:hover {
            background: #226d7b;
            transform: scale(1.05);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        /* Entrada de archivo */
        input[type="file"] {
            display: block;
            margin: 20px auto;
            padding: 12px;
            border: 2px dashed #2a7d8c;
            border-radius: 5px;
            background-color: #f9f9f9;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        input[type="file"]:hover {
            background-color: #eef8fa;
        }

        /* Botón de procesar */
        button {
            display: block;
            margin: 20px auto;
            padding: 12px 25px;
            background-color: #2a7d8c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        button:hover {
            background-color: #226d7b;
            transform: scale(1.05);
        }

        /* Tabla */
        table {
            width: 90%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        table thead {
            background-color: #2a7d8c;
            color: white;
        }

        table th,
        table td {
            padding: 15px;
            text-align: center;
            border: 1px solid #ddd;
        }

        table tbody tr:nth-child(odd) {
            background-color: #f9f9f9;
        }

        table tbody tr:nth-child(even) {
            background-color: #ffffff;
        }

        table tbody tr:hover {
            background-color: #e6f7ff;
        }

        /* Responsividad */
        @media screen and (max-width: 768px) {
            table {
                width: 100%;
                font-size: 0.9em;
            }

            button,
            input[type="file"] {
                font-size: 1em;
            }

            .menu-container a {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Calcular Peso por Recorrido</h1>
    </header>
    <div class="menu-container">
        <h2>Menú Principal</h2>
        <ul>
            <li><a href="planificacion-fruver.html">Planificación Fru-Ver</a></li>
            <li><a href="index.html">Ciudadela</a></li>
            <li><a href="calcular_peso.html">Calcular Peso</a></li>
        </ul>
    </div>
    <main>
        <input type="file" id="fileInput" accept=".csv">
        <button id="processButton">Procesar Archivo</button>
        <table id="resultTable">
            <thead>
                <tr>
                    <th>Recorrido (Flete)</th>
                    <th>Peso Total (kg)</th>
                </tr>
            </thead>
            <tbody>
                <!-- Los resultados se mostrarán aquí -->
            </tbody>
        </table>
    </main>
    <script src="calcular_peso.js"></script>
</body>
</html>
