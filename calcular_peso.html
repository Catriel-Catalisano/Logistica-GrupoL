<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular Peso por Recorrido</title>
    <style>
        /* Estilo general del cuerpo */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        /* Encabezado */
        h1 {
            text-align: center;
            color: #4CAF50;
        }

        /* Estilo para el botón de procesar */
        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        /* Entrada de archivo */
        input[type="file"] {
            display: block;
            margin: 20px auto;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        /* Tabla */
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        table thead {
            background-color: #4CAF50;
            color: white;
        }

        table th,
        table td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
        }

        table tbody tr:hover {
            background-color: #f1f1f1;
        }

        /* Celda vacía */
        table td:empty {
            background-color: #ffcccc;
        }

        /* Responsividad */
        @media screen and (max-width: 768px) {
            table {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>Calcular Peso por Recorrido</h1>
    <input type="file" id="fileInput" accept=".csv">
    <button id="processButton">Procesar Archivo</button>
    <table border="1" id="resultTable">
        <thead>
            <tr>
                <th>Recorrido (Flete)</th>
                <th>Peso Total (kg)</th>
            </tr>
        </thead>
        <tbody>
            <!-- Los resultados se mostrarán aquí -->
        </tbody>
    </table>
    <script src="calcular_peso.js"></script>
</body>
</html>
