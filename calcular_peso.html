<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular Peso por Recorrido</title>
    <style>
        /* Estilo general del cuerpo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to bottom right, #f0f8ff, #e6f7ff);
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5em;
            color: #2a7d8c;
            margin-top: 20px;
        }

        /* Botones y entradas */
        input[type="file"],
        button {
            display: block;
            margin: 15px auto;
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        input[type="file"] {
            border: 2px dashed #2a7d8c;
            background: #f9f9f9;
            cursor: pointer;
        }

        button {
            background: #2a7d8c;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #226d7b;
        }

        /* Tablas */
        table {
            width: 90%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        table thead {
            background: #2a7d8c;
            color: white;
        }

        table th,
        table td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
        }

        table tbody tr:nth-child(odd) {
            background-color: #f9f9f9;
        }

        table tbody tr:nth-child(even) {
            background-color: #ffffff;
        }

        table tbody tr:hover {
            background-color: #e6f7ff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Calcular Peso por Recorrido</h1>
    </header>
    <main>
        <input type="file" id="fileInput" accept=".csv">
        <button id="processButton">Procesar Archivo</button>
        <table id="resultTable">
            <thead>
                <tr>
                    <th>Recorrido (Flete)</th>
                    <th>Peso Total (kg)</th>
                </tr>
            </thead>
            <tbody>
                <!-- Los resultados de los recorridos se mostrarán aquí -->
            </tbody>
        </table>
        <h2>Productos No Incluidos</h2>
        <table id="excludedProductsTable">
            <thead>
                <tr>
                    <th>Código de Artículo</th>
                    <th>Descripción</th>
                    <th>Cantidad</th>
                    <th>Recorrido</th>
                </tr>
            </thead>
            <tbody>
                <!-- Los productos no incluidos se mostrarán aquí -->
            </tbody>
        </table>
    </main>
    <script src="calcular_peso.js"></script>
</body>
</html>
